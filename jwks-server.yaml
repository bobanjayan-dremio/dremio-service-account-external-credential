---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jwks-server
  namespace: default
  labels:
    app: jwks-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jwks-server
  template:
    metadata:
      labels:
        app: jwks-server
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: jwks-volume
              mountPath: /usr/share/nginx/html
          livenessProbe:
            httpGet:
              path: /jwks.json
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: jwks-volume
          configMap:
            name: jwks-config
---
apiVersion: v1
kind: Service
metadata:
  name: jwks-server
  namespace: default
spec:
  selector:
    app: jwks-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
